# Astram Miner Settings
# Place this file next to the miner binary in config/minerSettings.conf

# Mining mode: solo (mine directly to node) or pool (connect to stratum pool)
MINING_MODE=solo

# Node RPC URL (used in solo mode)
NODE_RPC_URL=http://127.0.0.1:19533

# Pool host and port (used in pool mode)
POOL_HOST=127.0.0.1
POOL_PORT=3333

# Worker name (used in pool mode, format: address.worker_name)
WORKER_NAME=worker1
