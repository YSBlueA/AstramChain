# ─── Astram Mining Pool Configuration ─────────────────────────────────────────
# Copy this file to the directory you run the pool from, or set env vars.
# Environment variables take precedence over defaults in code.

# Node RPC endpoint (full Astram node must be running)
NODE_RPC_URL=http://127.0.0.1:19533

# Pool coinbase address (receives pool fee + undistributed rewards)
# POOL_ADDRESS=ASRMxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ─── Network ports ────────────────────────────────────────────────────────────
# Stratum (miners connect here)
STRATUM_BIND=0.0.0.0:3333

# getblocktemplate JSON-RPC (for software that uses GBT instead of Stratum)
GBT_BIND=0.0.0.0:8332

# Pool statistics REST API
STATS_BIND=0.0.0.0:8080

# ─── Economics ────────────────────────────────────────────────────────────────
# Pool fee deducted from each block reward before PPLNS distribution (percent)
POOL_FEE_PERCENT=1.0

# PPLNS window: number of recent accepted shares used for reward distribution.
# Larger window = smoother payouts, smaller = more luck-sensitive.
PPLNS_WINDOW=10000

# ─── VarDiff (variable miner difficulty) ─────────────────────────────────────
# Minimum pool difficulty (leading zero count)
VARDIFF_MIN=1

# Maximum pool difficulty (leading zero count)
VARDIFF_MAX=32

# Target seconds between accepted shares per miner (e.g. 15 = 1 share/15s)
VARDIFF_TARGET_SECS=15
