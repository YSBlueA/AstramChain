# Nginx config for pool.astramchain.com
# 적용: sudo cp nginx-pool.conf /etc/nginx/sites-available/astram-stratum
#        sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name pool.astramchain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 서버
server {
    server_name pool.astramchain.com;
    listen 443 ssl http2;

    ssl_certificate     /etc/nginx/ssl/domain.cert.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /var/www/astram-stratum;
    index index.html;

    access_log /var/log/nginx/pool.astramchain_access.log;
    error_log  /var/log/nginx/pool.astramchain_error.log;

    # ── 보안 헤더 (Google Safe Browsing 피싱 판정 해제용) ──────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://api.github.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.github.com; frame-ancestors 'none';" always;

    # ── .bat/.sh 직접 다운로드 차단 → GitHub Releases로 리다이렉트 ───────────
    # 웹 서버에서 실행 스크립트를 직접 제공하면 Google이 "소프트웨어 다운로드 유도"로 판정
    location /downloads/ {
        return 301 https://github.com/YSBlueA/AstramChain/releases/latest;
    }

    # ── Stats API 프록시 → Astram-stratum (포트 8081) ─────────────────────────
    location ~ ^/(stats|miners|blocks|payments) {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── /dashboard → dashboard/index.html ────────────────────────────────────
    location /dashboard {
        try_files $uri $uri/ /dashboard/index.html;
    }

    # ── 정적 파일 (랜딩 페이지) ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 숨긴 파일 접근 차단 ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
